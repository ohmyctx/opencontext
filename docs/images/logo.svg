<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="OpenContext">
  <defs>
    <linearGradient id="oc-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="oc-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c7d2fe" stop-opacity="0.75"/>
    </linearGradient>
    <filter id="oc-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="128" height="128" rx="28" fill="url(#oc-bg)"/>

  <circle cx="64" cy="64" r="46" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="4"/>
  <circle cx="64" cy="64" r="34" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="4"/>
  <circle cx="64" cy="64" r="22" fill="none" stroke="url(#oc-ring)" stroke-width="4"/>

  <circle cx="64" cy="64" r="10" fill="#ffffff" filter="url(#oc-glow)"/>

  <circle cx="96" cy="38" r="6.5" fill="#a5f3fc"/>
  <circle cx="96" cy="38" r="3" fill="#ffffff"/>

  <path d="M64 18 L68 30 L64 26 L60 30 Z" fill="rgba(255,255,255,0.55)"/>
  <path d="M110 64 L98 68 L102 64 L98 60 Z" fill="rgba(255,255,255,0.35)"/>
