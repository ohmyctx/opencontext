<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenContext Browser Collector</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page">
      <div class="container">

        <!-- Header -->
        <header class="header">
          <div class="logo">
            <svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="ocg" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#2563eb"/>
                  <stop offset="100%" stop-color="#1d4ed8"/>
                </linearGradient>
              </defs>
              <circle cx="64" cy="64" r="60" fill="url(#ocg)"/>
              <circle cx="64" cy="64" r="46" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="6"/>
              <circle cx="64" cy="64" r="30" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="5"/>
              <circle cx="64" cy="64" r="12" fill="white"/>
              <circle cx="98" cy="36" r="7" fill="rgba(255,255,255,0.9)"/>
            </svg>
          </div>
          <div class="header-text">
            <h1>OpenContext Collector</h1>
            <p>Browser activity tracking for Claude Code &amp; friends</p>
          </div>
          <span id="statusBadge" class="status-badge offline">offline</span>
        </header>

        <!-- Connection -->
        <section class="card">
          <div class="card-head">
            <h2 class="card-title">Connection</h2>
          </div>
          <div class="card-body">
            <div class="field">
              <label for="daemonUrl">Daemon URL</label>
              <input id="daemonUrl" type="url" placeholder="http://127.0.0.1:6060" value="http://127.0.0.1:6060">
            </div>
            <div class="field">
              <label for="browserName">Browser label</label>
              <input id="browserName" type="text" placeholder="chrome" value="chrome">
            </div>
          </div>
        </section>

        <!-- Capture options -->
        <section class="card">
          <div class="card-head">
            <h2 class="card-title">Capture</h2>
          </div>
          <div class="card-body">
            <div class="checkbox-group">
              <label class="checkbox-item">
                <input id="capturePageVisits" type="checkbox" checked>
                <span><strong>Page visits</strong><br><span class="hint">Navigate events with duration and title</span></span>
              </label>
              <label class="checkbox-item">
                <input id="captureTabFocus" type="checkbox" checked>
                <span><strong>Tab focus</strong><br><span class="hint">Tab activate / deactivate events</span></span>
              </label>
              <label class="checkbox-item">
                <input id="captureActions" type="checkbox" checked>
                <span><strong>UI interactions</strong><br><span class="hint">Link clicks, button clicks, form submits, searches</span></span>
              </label>
              <label class="checkbox-item">
                <input id="captureInputs" type="checkbox">
                <span><strong>Text input</strong><br><span class="hint">Submitted text in forms and search fields</span></span>
              </label>
            </div>
          </div>
        </section>

        <!-- Privacy -->
        <section class="card">
          <div class="card-head">
            <h2 class="card-title">Privacy</h2>
          </div>
          <div class="card-body">
            <div class="field">
              <label for="maxSensitivity">Max sensitivity level</label>
              <select id="maxSensitivity">
                <option value="1">L1 — metadata only (url, title, timestamps)</option>
                <option value="2" selected>L2 — structured content (page title, form labels)</option>
                <option value="3">L3 — sensitive content (input text, clipboard)</option>
              </select>
            </div>
            <div class="field">
              <label for="ignoredDomains">Ignored domains</label>
              <span class="label-hint">One domain per line — events from these sites are dropped</span>
              <textarea id="ignoredDomains" rows="4" placeholder="bank.example.com&#10;mail.example.com&#10;accounts.google.com"></textarea>
            </div>
          </div>
        </section>

        <!-- Actions -->
        <div class="actions">
          <button id="save" class="btn btn-primary" type="button">Save settings</button>
          <button id="test" class="btn btn-secondary" type="button">Send test event</button>
        </div>

        <p id="status"></p>

        <!-- Footer -->
        <footer class="footer">
          <span>OpenContext v<span id="version">—</span></span>
          <a href="https://github.com/yetanotherai/opencontext" target="_blank" rel="noopener">GitHub</a>
        </footer>

      </div>
    </main>
    <script src="options.js"></script>
  </body>
</html>
