<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenContext</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="popup-body">
    <main class="popup">

      <!-- Status bar -->
      <div class="popup-status">
        <div class="popup-logo">
          <svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="ocg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#2563eb"/>
                <stop offset="100%" stop-color="#1d4ed8"/>
              </linearGradient>
            </defs>
            <circle cx="64" cy="64" r="60" fill="url(#ocg)"/>
            <circle cx="64" cy="64" r="46" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="6"/>
            <circle cx="64" cy="64" r="30" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="5"/>
            <circle cx="64" cy="64" r="12" fill="white"/>
            <circle cx="98" cy="36" r="7" fill="rgba(255,255,255,0.9)"/>
          </svg>
        </div>
        <div class="popup-meta">
          <span class="popup-title">OpenContext</span>
          <span id="statusLine" class="popup-status-line">Checking...</span>
        </div>
        <div id="statusDot" class="popup-dot offline"></div>
      </div>

      <!-- Stats -->
      <div class="popup-stats">
        <div class="popup-stat">
          <span id="statEvents" class="popup-stat-value">—</span>
          <span class="popup-stat-label">events</span>
        </div>
        <div class="popup-stat-div"></div>
        <div class="popup-stat">
          <span id="statSources" class="popup-stat-value">—</span>
          <span class="popup-stat-label">sources</span>
        </div>
        <div class="popup-stat-div"></div>
        <div class="popup-stat">
          <span id="statUptime" class="popup-stat-value">—</span>
          <span class="popup-stat-label">uptime</span>
        </div>
      </div>

      <!-- Source breakdown -->
      <div class="popup-sources" id="sourceList">
        <div class="popup-source-item">
          <span class="popup-source-name">browser</span>
          <span class="popup-source-count" id="cntBrowser">—</span>
        </div>
        <div class="popup-source-item">
          <span class="popup-source-name">shell</span>
          <span class="popup-source-count" id="cntShell">—</span>
        </div>
        <div class="popup-source-item">
          <span class="popup-source-name">claude</span>
          <span class="popup-source-count" id="cntClaude">—</span>
        </div>
        <div class="popup-source-item">
          <span class="popup-source-name">os</span>
          <span class="popup-source-count" id="cntOS">—</span>
        </div>
      </div>

      <!-- Actions -->
      <div class="popup-actions">
        <button id="refresh" class="popup-btn-icon" title="Refresh" type="button">
          <svg viewBox="0 0 16 16" fill="none"><path d="M13.65 2.35A8 8 0 1 0 15 8h-2a6 6 0 1 1-1.5-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <button id="options" class="popup-btn" type="button">Options</button>
      </div>

    </main>
    <script src="popup.js"></script>
  </body>
</html>
