# =============================================================================
# OpenContext Configuration Example / 配置文件示例
# =============================================================================
# This file shows all available configuration options with descriptions.
# Run `oc schema config --format json` for a machine-readable schema.
#
# 中文说明：此文件展示所有可用配置项及其含义。运行 `oc schema config --format json`
# 获取机器可读的配置 schema。
# =============================================================================

# ─── Daemon / 守护进程 ────────────────────────────────────────────────────────

# data_dir: Directory where OpenContext stores SQLite DB, memory files, and logs.
# 数据目录：OpenContext 存储 SQLite 数据库、内存文件和日志的目录。
data_dir: "~/.opencontext"

# listen_addr: HTTP address the daemon listens on. Agents and collectors POST here.
# 监听地址：守护进程监听的 HTTP 地址。Agent 和收集器向此地址发送事件。
listen_addr: "127.0.0.1:6060"

# log_level: Logging verbosity. Options: debug, info, warn, error.
# 日志级别：日志详细程度。选项：debug, info, warn, error。
log_level: "info"

# max_sensitivity: Global ingestion cap. Events above this sensitivity are dropped.
# Options: 1 (L1, metadata only), 2 (L2, default, full args/URLs), 3 (L3, raw input).
# 全局敏感度上限：超过此敏感度级别的事件将被丢弃。
# 选项：1（L1，仅元数据），2（L2，默认值，含完整参数/URL），3（L3，原始输入）。
max_sensitivity: 2

# retention_days: How many days to keep raw events before daily pruning. 0 = no pruning.
# 保留天数：事件保留天数，超过后每日清理。0 = 不清理（默认90天）。
retention_days: 90

# ─── Subscriptions / 订阅配置 ─────────────────────────────────────────────────
# A subscription chooses which events become memory and where that memory is written.
# 一条订阅决定哪些事件成为记忆，以及记忆写入到哪里。

subscriptions:
  # ── Example 1: Global memory — all sources, injected into Claude Code globally
  # 示例 1：全局记忆 — 所有来源，注入到 Claude Code 全局 CLAUDE.md ───────────
  - name: "global"
    filter:
      sources: ["shell", "claude", "codex", "cursor", "opencode"]
      max_sensitivity: 2
    memory:
      backend: "raw_dump"
      # path: The canonical memory file. Auto-generated — do not edit manually.
      # path：规范记忆文件，自动生成，勿手动编辑。
      path: "~/.opencontext/memory.md"

      # ── Agent integrations (choose any combination) ──────────────────────────

      # claude_md: Injects memory directly into CLAUDE.md using markers.
      #            Works for global (~/.claude/CLAUDE.md) or project-level CLAUDE.md.
      # claude_md：用标记将记忆直接注入 CLAUDE.md（全局或项目级均可）。
      # claude_md: "~/.claude/CLAUDE.md"

      # agents_md: Injects memory into AGENTS.md using markers.
      #            For Codex, OpenCode, and other OpenAI AGENTS.md-compatible agents.
      # agents_md：用标记将记忆注入 AGENTS.md，适用于 Codex、OpenCode 等。
      # agents_md: "~/my-project/AGENTS.md"

      # cursor_rules_dir: Writes opencontext-memory.mdc into the Cursor rules directory.
      #                   OpenContext owns this file and overwrites it on every compile.
      # cursor_rules_dir：将 opencontext-memory.mdc 写入 Cursor rules 目录，每次编译覆盖。
      # cursor_rules_dir: "~/my-project/.cursor/rules"

      # inject_targets: Inject memory into any other Markdown memory file (Hermes, OpenClaw, etc.).
      # inject_targets：注入到其他 Markdown 记忆文件（Hermes、OpenClaw 等）。
      # inject_targets:
      #   - path: "~/.hermes/memories/MEMORY.md"
      #     header: "## OpenContext Recent Activity"
      #   - path: "~/.openclaw/workspace/MEMORY.md"
      #     header: "## OpenContext Recent Activity"

    # refresh_interval: Seconds between raw_dump auto-compiles (default 300, min 10).
    # 刷新间隔：raw_dump 自动编译间隔，单位秒（默认300，最小10）。
    refresh_interval: 300

  # ── Example 2: Project-specific memory — Claude Code + Cursor for one project
  # 示例 2：项目级记忆 — 同时接入 Claude Code 和 Cursor ─────────────────────
  # - name: "my-project"
  #   filter:
  #     label_selectors:
  #       project: "my-project"
  #     sources: ["shell", "claude", "codex", "cursor", "opencode"]
  #     max_sensitivity: 2
  #   memory:
  #     backend: "raw_dump"
  #     path: "/path/to/my-project/.opencontext/memory.md"
  #     claude_md: "/path/to/my-project/CLAUDE.md"
  #     agents_md: "/path/to/my-project/AGENTS.md"
  #     cursor_rules_dir: "/path/to/my-project/.cursor/rules"
  #   refresh_interval: 300

  # ── Example 3: LLM summarization — requires LLM config below
  # 示例 3：LLM 总结模式 — 需要下方 LLM 配置 ──────────────────────────────────
  # - name: "summarized"
  #   filter:
  #     sources: ["shell", "claude"]
  #     max_sensitivity: 2
  #   memory:
  #     backend: "file"
  #     path: "/path/to/my-project/.opencontext/memory.md"
  #     claude_md: "/path/to/my-project/CLAUDE.md"
  #   schedule: "0 */6 * * *"   # cron: every 6 hours
  #   llm:
  #     provider: "openai"      # or "anthropic", "ollama"
  #     model: "gpt-4o"
  #     api_key: ""             # set your key here, or use OPENAI_API_KEY env var
  #     base_url: ""            # optional custom API endpoint

# ─── All Config Fields Reference / 全部配置字段参考 ───────────────────────────
#
# Daemon-level (top-level):
#   data_dir        string   Storage root directory (default: ~/.opencontext)
#   listen_addr     string   HTTP listen address (default: 127.0.0.1:6060)
#   log_level      string   Log level: debug|info|warn|error (default: info)
#   max_sensitivity int     Global ingestion cap 1-3 (default: 2)
#   retention_days  int      Days to keep events, 0=forever (default: 90)
#   subscriptions  []Subscription  List of memory subscriptions
#
# Subscription fields:
#   name                   string   Unique subscription name
#   filter.label_selectors map      Label key=value pairs (event must match all)
#   filter.sources         []string Source name filter (empty=all)
#   filter.max_sensitivity int      Per-subscription sensitivity cap
#   memory.backend         string   "raw_dump" or "file"
#   memory.path            string   Output memory file path (auto-generated, do not edit)
#   memory.claude_md       string   CLAUDE.md path — injects memory section with markers
#   memory.agents_md       string   AGENTS.md path — injects memory section with markers
#   memory.cursor_rules_dir string  .cursor/rules/ dir — writes opencontext-memory.mdc
#   memory.inject_targets  []InjectTarget  Additional injection files
#   schedule               string   Cron expression for LLM compile triggers
#   refresh_interval       int      Seconds between raw_dump auto-refreshes (default 300)
#   llm.provider           string   LLM provider: openai|anthropic|ollama
#   llm.model              string   Model name
#   llm.api_key            string   API key (or env var)
#   llm.base_url           string   Custom API endpoint URL
#
# InjectTarget fields:
#   path    string   Target file path to inject memory into
#   header  string   Section heading inside injected block (default: "## OpenContext — Recent Activity")
#
# Privacy sensitivity levels:
#   L1 (1): App name, command name, git repo, URL domain only
#   L2 (2): Full command args, commit messages, full URLs (default)
#   L3 (3): Keyboard input, full chat text, screenshots